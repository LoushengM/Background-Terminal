name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore projects
        shell: pwsh
        run: |
          dotnet restore Background-Terminal.Core/Background-Terminal.Core.csproj
          dotnet restore Background-Terminal/Background-Terminal.csproj --runtime win-x64
          dotnet restore Background-Terminal.Core.Tests/Background-Terminal.Core.Tests.csproj
          dotnet restore Background-Terminal.IntegrationTests/Background-Terminal.IntegrationTests.csproj

      - name: Build core
        run: dotnet build Background-Terminal.Core/Background-Terminal.Core.csproj --configuration Release --no-restore

      - name: Build application
        run: dotnet build Background-Terminal/Background-Terminal.csproj --configuration Release --no-restore --property:Platform=x64

      - name: Run tests
        shell: pwsh
        run: |
          dotnet test Background-Terminal.Core.Tests/Background-Terminal.Core.Tests.csproj --configuration Release --no-restore
          dotnet test Background-Terminal.IntegrationTests/Background-Terminal.IntegrationTests.csproj --configuration Release --no-restore --property:Platform=x64

      - name: Build installer
        shell: pwsh
        run: |
          $wixPath = $null
          $localWixPath = 'C:\Program Files (x86)\WiX Toolset v3.11\bin'

          if ((Test-Path -LiteralPath (Join-Path $localWixPath 'candle.exe')) -and (Test-Path -LiteralPath (Join-Path $localWixPath 'light.exe'))) {
            $wixPath = $localWixPath
          } else {
            $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
            $light = Get-Command light.exe -ErrorAction SilentlyContinue

            if ($candle -and $light -and ((Split-Path -Parent $candle.Source) -eq (Split-Path -Parent $light.Source))) {
              $wixPath = Split-Path -Parent $candle.Source
            }
          }

          if ($wixPath) {
            & .\Background-Terminal-Setup\BuildMsi.ps1 -NoRestore -WixPath $wixPath
          } else {
            Write-Host 'Skipping MSI packaging because WiX v3.11 candle.exe and light.exe were not found.'
          }
